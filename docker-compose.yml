services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paper_agent
      POSTGRES_PASSWORD: paper_agent
      POSTGRES_DB: paper_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paper_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  agent-service:
    build: ./agent
    ports:
      - "50051:50051"
    environment:
      GRPC_PORT: "50051"
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-local-hash-768}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      LOCAL_EMBEDDING_DIMENSIONS: ${LOCAL_EMBEDDING_DIMENSIONS:-768}
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: paper_agent
      POSTGRES_PASSWORD: paper_agent
      POSTGRES_DBNAME: paper_agent
      POSTGRES_SSLMODE: disable
      SEARCH_CACHE_TTL_SECONDS: ${SEARCH_CACHE_TTL_SECONDS:-3600}
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      UPLOAD_DIR: /app/uploads
      MAX_ANALYSIS_PAPERS: ${MAX_ANALYSIS_PAPERS:-5}
      SESSION_TOKEN_BUDGET: ${SESSION_TOKEN_BUDGET:-50000}
      TOKEN_COMPRESS_THRESHOLD: ${TOKEN_COMPRESS_THRESHOLD:-0.8}
      TOKEN_RESERVED_OUTPUT_TOKENS: ${TOKEN_RESERVED_OUTPUT_TOKENS:-2000}
      TOKEN_KEEP_RECENT_TURNS: ${TOKEN_KEEP_RECENT_TURNS:-3}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}
    volumes:
      - agent_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      REDIS_ADDR: redis:6379
      GRPC_AGENT_ADDR: agent-service:50051
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: paper_agent
      POSTGRES_PASSWORD: paper_agent
      POSTGRES_DBNAME: paper_agent
      POSTGRES_SSLMODE: disable
      GATEWAY_PORT: "8080"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      agent-service:
        condition: service_started

  web:
    build: ./web
    ports:
      - "3000:3000"
    depends_on:
      - gateway

volumes:
  postgres_data:
  chroma_data:
  agent_uploads:
