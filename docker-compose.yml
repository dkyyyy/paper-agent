version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paper_agent
      POSTGRES_PASSWORD: paper_agent
      POSTGRES_DB: paper_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paper_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  agent-service:
    build: ./agent
    ports:
      - "50051:50051"
    environment:
      GRPC_PORT: "50051"
      LLM_PROVIDER: ${LLM_PROVIDER:-dashscope}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-qwen-plus}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v3}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-}
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    depends_on:
      redis:
        condition: service_healthy
      chroma:
        condition: service_started

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      REDIS_ADDR: redis:6379
      GRPC_AGENT_ADDR: agent-service:50051
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: paper_agent
      POSTGRES_PASSWORD: paper_agent
      POSTGRES_DBNAME: paper_agent
      GATEWAY_PORT: "8080"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      agent-service:
        condition: service_started

  web:
    build: ./web
    ports:
      - "3000:3000"
    depends_on:
      - gateway

volumes:
  postgres_data:
  chroma_data:
